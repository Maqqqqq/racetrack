<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/RaceControl/RaceControl.js" defer></script>
    <link rel="stylesheet" href="/RaceControl/RaceControl.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="container">
        <div class="race-modes">
            <div class="mode-btn safe">Safe</div>
            <div class="mode-btn hazard">Hazard</div>
            <div class="mode-btn danger">Danger</div>
            <div class="mode-btn finished">Finished</div>
        </div>
        <button id="startRace" class="control-btn">Start Race</button>
        <div id="endRace" class="control-btn">End Race</div>
        <div id="nextRaceSession" class="next-race">
            <h3>Next Race Session</h3>
            <div id="nextRaceDrivers"></div>
        </div>
    </div>
</body>
</html>
